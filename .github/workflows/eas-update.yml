# Publishes an EAS Update (OTA) so JS-only fixes can ship without
# a full native rebuild. Runs after CI on master, and on demand via
# workflow_dispatch.
#
# Required GitHub repository secrets:
#   EXPO_TOKEN              — EAS access token (Expo dashboard → Access Tokens)
#   EXPO_PUBLIC_CONVEX_URL  — same value as .env.local; baked into the JS bundle
#
# Optional secrets (only needed if the corresponding feature is on):
#   EXPO_PUBLIC_SENTRY_DSN  — bakes Sentry DSN into the bundle
#   SENTRY_AUTH_TOKEN       — uploads source maps so prod stacks symbolicate
#
# OTA caveats this workflow can't fix:
#   * Native module changes (new package, plugin config, app.json native
#     fields) require a full `eas build` — OTA only ships the JS bundle.
#   * The `runtimeVersion` policy in app.json is "appVersion", so an OTA
#     only reaches builds whose `expo.version` matches the source tree at
#     publish time. Bumping `version` in app.json strands old builds on
#     their last OTA.

name: EAS Update

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]
  workflow_dispatch:
    inputs:
      branch:
        description: EAS Update branch to publish to
        required: true
        default: production
        type: choice
        options:
          - production
          - preview
      message:
        description: Update message (defaults to the latest commit subject)
        required: false

jobs:
  publish:
    # Skip on a failed CI run. Manual dispatches always run.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Resolve update branch + message
        id: meta
        env:
          DISPATCH_BRANCH: ${{ inputs.branch }}
          DISPATCH_MESSAGE: ${{ inputs.message }}
        run: |
          BRANCH="${DISPATCH_BRANCH:-production}"
          if [ -n "$DISPATCH_MESSAGE" ]; then
            MESSAGE="$DISPATCH_MESSAGE"
          else
            # Latest commit on master at the time the workflow runs.
            MESSAGE="$(git log -1 --pretty=%s)"
          fi
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          # Multi-line-safe message passing.
          {
            echo "message<<EOF"
            echo "$MESSAGE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish update
        env:
          EXPO_PUBLIC_CONVEX_URL: ${{ secrets.EXPO_PUBLIC_CONVEX_URL }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          eas update \
            --branch "${{ steps.meta.outputs.branch }}" \
            --message "${{ steps.meta.outputs.message }}" \
            --non-interactive
