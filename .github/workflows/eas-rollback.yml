# Panic-button rollback for OTA. Publishes a rollback-to-embedded
# marker on the chosen EAS Update branch + platform; clients revert
# to the bundle that shipped inside the binary on next cold launch.
#
# Use this when an OTA bundle has broken the app and we need users
# unstuck before we ship a corrected update. After rolling back, fix
# the underlying issue, re-publish via eas-update.yml.
#
# Required GitHub repository secret:
#   EXPO_TOKEN — same token eas-update.yml uses
#
# `eas update:roll-back-to-embedded` shells out to `npx expo config`
# under the hood (to read the runtimeVersion policy + plugin list), so
# the project's deps have to be installed even though no JS is being
# bundled. The npm ci step adds ~90s; that's the cost of running the
# rollback through EAS rather than poking the manifest server directly.

name: EAS Rollback to Embedded

on:
  workflow_dispatch:
    inputs:
      branch:
        description: EAS Update branch to roll back
        required: true
        default: production
        type: choice
        options:
          - production
          - preview
      platform:
        description: Platform to roll back
        required: true
        default: ios
        type: choice
        options:
          - ios
          - android
          - all
      runtime_version:
        description: Runtime version to scope the rollback to (defaults to expo.version from app.json)
        required: false
      confirm:
        description: Type ROLLBACK (uppercase) to confirm
        required: true
        type: string
      message:
        description: Optional rollback message (e.g. issue link)
        required: false

jobs:
  rollback:
    # Refuse to run without explicit confirmation. Keeps an idle
    # tab/finger-slip from rolling production back by accident.
    if: ${{ inputs.confirm == 'ROLLBACK' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        # `eas update:roll-back-to-embedded` runs `npx expo config`
        # internally, which can't resolve plugins like expo-router
        # without the workspace deps installed. An earlier draft of
        # this workflow skipped npm ci on the assumption that a
        # rollback marker is metadata-only — that assumption was
        # wrong, and the previous run died with "Failed to resolve
        # plugin for module 'expo-router'".
        run: npm ci

      - name: Resolve rollback message + runtime version
        id: meta
        env:
          DISPATCH_MESSAGE: ${{ inputs.message }}
          DISPATCH_RUNTIME_VERSION: ${{ inputs.runtime_version }}
        run: |
          if [ -n "$DISPATCH_MESSAGE" ]; then
            MESSAGE="$DISPATCH_MESSAGE"
          else
            MESSAGE="Rollback to embedded — ${{ inputs.branch }}/${{ inputs.platform }}, triggered by ${{ github.actor }}"
          fi
          {
            echo "message<<EOF"
            echo "$MESSAGE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          # `eas update:roll-back-to-embedded` is scoped to a runtime
          # version, not just a branch. Under app.json's
          # `runtimeVersion: { policy: "appVersion" }`, the runtime
          # version baked into the binary equals `expo.version`. Read
          # it back so we don't hardcode "1.0.0" and silently roll
          # back the wrong slice after a release bumps the version.
          # Manual override available via the workflow input.
          if [ -n "$DISPATCH_RUNTIME_VERSION" ]; then
            RUNTIME_VERSION="$DISPATCH_RUNTIME_VERSION"
          else
            RUNTIME_VERSION="$(node -e 'console.log(require("./app.json").expo.version)')"
          fi
          if [ -z "$RUNTIME_VERSION" ]; then
            echo "::error::Couldn't resolve runtime version. Pass runtime_version explicitly or check app.json."
            exit 1
          fi
          echo "Using runtime version: $RUNTIME_VERSION"
          echo "runtime_version=$RUNTIME_VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish rollback marker
        # `eas update:roll-back-to-embedded` is the only non-interactive
        # path to embedded rollback in EAS CLI 18.x — `eas update:rollback`
        # is interactive-only and `eas update --rollback-to-embedded`
        # was removed (an earlier version of this workflow tried it as
        # a fallback and the CLI rejected the flag).
        run: |
          eas update:roll-back-to-embedded \
            --branch "${{ inputs.branch }}" \
            --platform "${{ inputs.platform }}" \
            --runtime-version "${{ steps.meta.outputs.runtime_version }}" \
            --message "${{ steps.meta.outputs.message }}" \
            --non-interactive
